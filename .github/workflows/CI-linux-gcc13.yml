---

name: Linux GCC

on: [push, pull_request, workflow_dispatch]

jobs:
  linux_gcc13:
    uses: ./.github/workflows/CI-common.yml
    with:
      runner: ubuntu-24.04
      toolchain_id: linux-gcc-13

  linux_gcc15:
    uses: ./.github/workflows/CI-common.yml
    with:
      runner: ubuntu-24.04
      toolchain_id: linux-gcc-15
